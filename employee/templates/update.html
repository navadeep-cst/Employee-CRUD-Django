{%extends "base.html"%}
{%block title%}Update Employee{%endblock%}
{%block content%}
{%load crispy_forms_tags%}
<h2>Update the employee Employee</h2>

<form method="POST" class="form-group card pt-4">
    {%csrf_token%}
    {{form | crispy}}
    <button type="submit" class="btn btn-primary">Save Employee</button><br />
    <a href={%url 'list'%} class="btn btn-secondary">Cancel</a>
</form>

{%endblock%}
